<!-- project-list.component.html -->
@if (visible) {
  <div
    class="w-full max-w-lg overflow-hidden transition-all duration-500 ease-in-out"
    [class]="
      visible
        ? 'max-h-64 opacity-100 translate-y-0'
        : 'max-h-0 opacity-0 translate-y-4'
    "
  >
    <ul class="flex flex-col gap-3 pt-2 pb-4 border-t border-white/10">
      @for (work of works; track work) {
        <li
          class="font-sans text-sm text-white/60 tracking-wide hover:text-white transition-colors duration-200 cursor-pointer"
        >
          {{ work }}
        </li>
      }
    </ul>
  </div>
}
